<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML 原型可视化编辑工具</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ===== 全局变量与重置 ===== */
:root {
  --bg-primary: #0f1117;
  --bg-secondary: #1a1d27;
  --bg-tertiary: #242836;
  --bg-hover: #2d3245;
  --border-color: #2e3348;
  --text-primary: #e8eaed;
  --text-secondary: #9aa0b4;
  --text-muted: #6b7280;
  --accent: #6c5ce7;
  --accent-hover: #7c6ff7;
  --accent-glow: rgba(108, 92, 231, 0.3);
  --success: #00b894;
  --warning: #fdcb6e;
  --danger: #e17055;
  --radius: 8px;
  --transition: 0.2s ease;
  --sidebar-width: 260px;
  --panel-width: 280px;
  --toolbar-height: 52px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  height: 100vh;
  overflow: hidden;
  user-select: none;
}

/* ===== 滚动条 ===== */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ===== 主布局 ===== */
.app-layout {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ===== 顶部工具栏 ===== */
.toolbar {
  height: var(--toolbar-height);
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border-color);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 8px;
  flex-shrink: 0;
  z-index: 100;
}

.toolbar-brand {
  display: flex;
  align-items: center;
  gap: 8px;
  padding-right: 16px;
  border-right: 1px solid var(--border-color);
  margin-right: 8px;
}

.toolbar-brand svg { width: 24px; height: 24px; }
.toolbar-brand span {
  font-weight: 600;
  font-size: 14px;
  background: linear-gradient(135deg, #6c5ce7, #a29bfe);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}

.toolbar-group {
  display: flex;
  align-items: center;
  gap: 2px;
}

.toolbar-divider {
  width: 1px;
  height: 28px;
  background: var(--border-color);
  margin: 0 8px;
}

.tb-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  height: 34px;
  padding: 0 10px;
  border: none;
  background: transparent;
  color: var(--text-secondary);
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  font-family: inherit;
  transition: all var(--transition);
  white-space: nowrap;
}

.tb-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
.tb-btn:active { transform: scale(0.96); }
.tb-btn.primary { background: var(--accent); color: #fff; }
.tb-btn.primary:hover { background: var(--accent-hover); box-shadow: 0 0 12px var(--accent-glow); }
.tb-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.tb-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

.toolbar-spacer { flex: 1; }

.toolbar-file-name {
  font-size: 13px;
  color: var(--text-muted);
  max-width: 300px;
  overflow: hidden;
  text-overflow: ellipsis;
}
.toolbar-file-name.active { color: var(--text-primary); }

/* ===== 主体区域 ===== */
.main-body {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ===== 左侧文件面板 ===== */
.sidebar {
  width: var(--sidebar-width);
  background: var(--bg-secondary);
  border-right: 1px solid var(--border-color);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  transition: width var(--transition);
}

.sidebar.collapsed { width: 0; overflow: hidden; border: none; }

.sidebar-tabs {
  display: flex;
  border-bottom: 1px solid var(--border-color);
  flex-shrink: 0;
}

.sidebar-tab {
  flex: 1;
  padding: 10px 0;
  text-align: center;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  background: transparent;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  font-family: inherit;
  transition: all var(--transition);
}

.sidebar-tab:hover { color: var(--text-primary); }
.sidebar-tab.active { color: var(--accent); border-bottom-color: var(--accent); background: rgba(108,92,231,0.05); }

.sidebar-panel { flex: 1; overflow-y: auto; display: none; flex-direction: column; }
.sidebar-panel.active { display: flex; }

.sidebar-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border-color);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.sidebar-header h3 {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
}

/* Component Panel */
.comp-search {
  padding: 8px 12px;
  border-bottom: 1px solid var(--border-color);
}

.comp-search input {
  width: 100%;
  height: 30px;
  padding: 0 10px 0 30px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border-color);
  border-radius: 6px;
  color: var(--text-primary);
  font-size: 12px;
  font-family: inherit;
  outline: none;
}

.comp-search input:focus { border-color: var(--accent); }

.comp-group-title {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 16px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  cursor: pointer;
  user-select: none;
  border: none;
  background: transparent;
  width: 100%;
  font-family: inherit;
  transition: color var(--transition);
}

.comp-group-title:hover { color: var(--text-primary); }
.comp-group-title .arrow { transition: transform 0.2s; }
.comp-group-title.collapsed .arrow { transform: rotate(-90deg); }

.comp-group-items {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  padding: 4px 12px 10px;
}

.comp-group-items.collapsed { display: none; }

.comp-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 10px 4px;
  border: 1px solid var(--border-color);
  border-radius: 6px;
  background: var(--bg-tertiary);
  cursor: grab;
  font-size: 11px;
  color: var(--text-secondary);
  transition: all var(--transition);
  text-align: center;
}

.comp-item:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(108,92,231,0.08);
}

.comp-item:active { cursor: grabbing; transform: scale(0.95); }
.comp-item .comp-icon { font-size: 18px; }

.dir-input-wrap {
  padding: 8px 12px;
  border-bottom: 1px solid var(--border-color);
}

.dir-input-row {
  display: flex;
  gap: 6px;
}

.dir-input {
  flex: 1;
  height: 32px;
  padding: 0 10px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border-color);
  border-radius: 6px;
  color: var(--text-primary);
  font-size: 12px;
  font-family: inherit;
  outline: none;
  transition: border-color var(--transition);
}
.dir-input:focus { border-color: var(--accent); }
.dir-input::placeholder { color: var(--text-muted); }

.dir-btn {
  height: 32px;
  padding: 0 10px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
  font-family: inherit;
  transition: all var(--transition);
}
.dir-btn:hover { background: var(--accent-hover); }

.file-tree {
  flex: 1;
  overflow-y: auto;
  padding: 4px 0;
}

.file-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 16px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text-secondary);
  transition: all var(--transition);
  border-left: 3px solid transparent;
}
.file-item:hover { background: var(--bg-hover); color: var(--text-primary); }
.file-item.active {
  background: rgba(108, 92, 231, 0.1);
  color: var(--accent);
  border-left-color: var(--accent);
}
.file-item .icon { font-size: 15px; flex-shrink: 0; }
.file-item .name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.file-tree-empty {
  padding: 24px 16px;
  text-align: center;
  color: var(--text-muted);
  font-size: 13px;
  line-height: 1.6;
}

/* ===== 中间画布区域 ===== */
.canvas-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: var(--bg-primary);
  overflow: hidden;
  position: relative;
}

.canvas-wrapper {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  overflow: hidden;
  background:
    radial-gradient(circle at 50% 50%, rgba(108, 92, 231, 0.03) 0%, transparent 70%),
    repeating-linear-gradient(0deg, transparent, transparent 19px, rgba(255,255,255,0.02) 19px, rgba(255,255,255,0.02) 20px),
    repeating-linear-gradient(90deg, transparent, transparent 19px, rgba(255,255,255,0.02) 19px, rgba(255,255,255,0.02) 20px);
}

.canvas-frame {
  background: #fff;
  border-radius: 8px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.05);
  overflow: visible;
  transition: width 0.3s ease, height 0.3s ease;
  position: relative;
  flex-shrink: 0; /* 防止宽度被 Flex 容器截断压缩 */
}

.canvas-frame.resizing {
  transition: none !important;
}

.canvas-frame iframe {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
  border-radius: inherit;
  background: #fff;
}

/* 画布边框调整手柄 */
.canvas-resizer {
  position: absolute;
  z-index: 1000;
  display: block;
}
.canvas-resizer-r { top: 0; right: -5px; bottom: 0; width: 10px; cursor: ew-resize; }
.canvas-resizer-b { left: 0; bottom: -5px; right: 0; height: 10px; cursor: ns-resize; }
.canvas-resizer-br { right: -6px; bottom: -6px; width: 14px; height: 14px; cursor: nwse-resize; }

.canvas-resizer:hover::after, .canvas-resizer.active::after {
  content: ''; position: absolute; background: var(--accent);
}
.canvas-resizer-r::after { top: 0; bottom: 0; left: 4px; width: 2px; }
.canvas-resizer-b::after { left: 0; right: 0; top: 4px; height: 2px; }
.canvas-resizer-br::after {
  right: 4px; bottom: 4px; width: 6px; height: 6px; 
  border-right: 2px solid var(--accent); border-bottom: 2px solid var(--accent); background: transparent;
}

/* 空状态 */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-muted);
  gap: 16px;
}
.empty-state svg { width: 64px; height: 64px; opacity: 0.3; }
.empty-state p { font-size: 14px; }
.empty-state .hint { font-size: 12px; opacity: 0.6; }

/* 设备切换栏 */
.device-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  padding: 6px 0;
  background: var(--bg-secondary);
  border-top: 1px solid var(--border-color);
}

.device-btn {
  padding: 4px 12px;
  border: none;
  background: transparent;
  color: var(--text-muted);
  font-size: 12px;
  border-radius: 4px;
  cursor: pointer;
  font-family: inherit;
  transition: all var(--transition);
}
.device-btn:hover { color: var(--text-primary); background: var(--bg-hover); }
.device-btn.active { color: var(--accent); background: rgba(108, 92, 231, 0.15); }

/* ===== 右侧属性面板 ===== */
.panel {
  width: var(--panel-width);
  background: var(--bg-secondary);
  border-left: 1px solid var(--border-color);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow-y: auto;
  transition: width var(--transition);
}

.panel.collapsed { width: 0; overflow: hidden; border: none; }

.panel-section {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border-color);
}

.panel-section-title {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  margin-bottom: 10px;
}

.panel-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}
.panel-row:last-child { margin-bottom: 0; }

.panel-label {
  font-size: 12px;
  color: var(--text-secondary);
  min-width: 48px;
  flex-shrink: 0;
}

.panel-input {
  flex: 1;
  height: 30px;
  padding: 0 8px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border-color);
  border-radius: 5px;
  color: var(--text-primary);
  font-size: 12px;
  font-family: inherit;
  outline: none;
  transition: border-color var(--transition);
}
.panel-input:focus { border-color: var(--accent); }

.panel-color-input {
  width: 30px;
  height: 30px;
  border: 1px solid var(--border-color);
  border-radius: 5px;
  padding: 2px;
  background: var(--bg-tertiary);
  cursor: pointer;
}

.panel-select {
  flex: 1;
  height: 30px;
  padding: 0 8px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border-color);
  border-radius: 5px;
  color: var(--text-primary);
  font-size: 12px;
  font-family: inherit;
  outline: none;
  cursor: pointer;
}

.panel-textarea {
  width: 100%;
  min-height: 60px;
  padding: 8px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border-color);
  border-radius: 5px;
  color: var(--text-primary);
  font-size: 12px;
  font-family: inherit;
  outline: none;
  resize: vertical;
  transition: border-color var(--transition);
}
.panel-textarea:focus { border-color: var(--accent); }

.panel-empty {
  padding: 40px 16px;
  text-align: center;
  color: var(--text-muted);
  font-size: 13px;
  line-height: 1.8;
}

/* 四向间距输入 */
.spacing-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}
.spacing-grid .panel-input { text-align: center; }

/* ===== Toast 通知 ===== */
.toast-container {
  position: fixed;
  top: 60px;
  right: 20px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.toast {
  padding: 10px 16px;
  border-radius: 8px;
  font-size: 13px;
  color: #fff;
  animation: slideIn 0.3s ease, fadeOut 0.3s ease 2.5s forwards;
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
}
.toast.success { background: var(--success); }
.toast.error { background: var(--danger); }
.toast.info { background: var(--accent); }

@keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
@keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }

/* Drop overlay for cross-iframe drag */
.drop-overlay {
  position: absolute;
  inset: 0;
  z-index: 10;
  display: none;
  cursor: copy;
}

.drop-overlay.active {
  display: block;
  background: rgba(108, 92, 231, 0.08);
  border: 2px dashed var(--accent);
  border-radius: 4px;
}

.drop-overlay.drag-over {
  background: rgba(108, 92, 231, 0.15);
}

/* ===== 图层面板 ===== */
.layer-tree {
  flex: 1;
  overflow-y: auto;
  padding: 4px 0;
  font-size: 12px;
}

.layer-node {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 4px 8px;
  cursor: pointer;
  color: var(--text-secondary);
  transition: background var(--transition), color var(--transition);
  white-space: nowrap;
  border-left: 2px solid transparent;
  min-height: 28px;
}

.layer-node:hover { background: var(--bg-hover); color: var(--text-primary); }
.layer-node.active {
  background: rgba(108, 92, 231, 0.12);
  color: var(--accent);
  border-left-color: var(--accent);
}

.layer-toggle {
  width: 16px;
  height: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 8px;
  color: var(--text-muted);
  cursor: pointer;
  transition: transform 0.15s;
  border-radius: 3px;
}
.layer-toggle:hover { background: var(--bg-tertiary); }
.layer-toggle.collapsed { transform: rotate(-90deg); }
.layer-toggle.empty { visibility: hidden; }

.layer-tag {
  font-size: 10px;
  color: var(--text-muted);
  background: var(--bg-tertiary);
  padding: 1px 5px;
  border-radius: 3px;
  flex-shrink: 0;
  font-family: 'Consolas', 'Monaco', monospace;
}

.layer-label {
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
  min-width: 0;
}

.layer-children { overflow: hidden; }
.layer-children.collapsed { display: none; }

/* ===== 折叠式属性面板 ===== */
.panel-section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  cursor: pointer;
  user-select: none;
  border-bottom: 1px solid var(--border-color);
  transition: background var(--transition);
}
.panel-section-header:hover { background: var(--bg-hover); }

.panel-section-header .section-title {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
}

.panel-section-header .section-arrow {
  font-size: 10px;
  color: var(--text-muted);
  transition: transform 0.2s;
}
.panel-section-header.collapsed .section-arrow { transform: rotate(-90deg); }

.panel-section-body {
  padding: 10px 16px 12px;
  border-bottom: 1px solid var(--border-color);
}
.panel-section-body.collapsed { display: none; }

/* 对齐工具条 */
.align-toolbar {
  display: flex;
  align-items: center;
  gap: 2px;
  padding: 8px 16px;
  border-bottom: 1px solid var(--border-color);
  background: var(--bg-secondary);
}

.align-btn {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: none;
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  border-radius: 4px;
  font-size: 14px;
  transition: all var(--transition);
}
.align-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
.align-btn.active { color: var(--accent); background: rgba(108,92,231,0.12); }

.align-divider {
  width: 1px;
  height: 20px;
  background: var(--border-color);
  margin: 0 4px;
}

/* 数值拖拽输入框 */
.panel-input.draggable-num {
  cursor: ew-resize;
}
.panel-input.draggable-num:focus {
  cursor: text;
}

/* WH 行内联排 */
.wh-row {
  display: grid;
  grid-template-columns: auto 1fr 12px auto 1fr;
  gap: 4px;
  align-items: center;
}
.wh-row .panel-label { min-width: unset; font-size: 11px; }

/* 颜色行改进 */
.color-row {
  display: flex;
  align-items: center;
  gap: 6px;
}

.color-swatch {
  width: 24px;
  height: 24px;
  border-radius: 4px;
  border: 1px solid var(--border-color);
  cursor: pointer;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}
.color-swatch input[type="color"] {
  opacity: 0;
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  cursor: pointer;
  border: none;
}

.color-hex {
  flex: 1;
  height: 26px;
  padding: 0 6px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border-color);
  border-radius: 4px;
  color: var(--text-primary);
  font-size: 11px;
  font-family: 'Consolas', monospace;
  outline: none;
}
.color-hex:focus { border-color: var(--accent); }

.color-opacity {
  width: 44px;
  height: 26px;
  padding: 0 4px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border-color);
  border-radius: 4px;
  color: var(--text-primary);
  font-size: 11px;
  text-align: center;
  outline: none;
}

/* 分段控制器 (用于文字对齐等) */
.segmented-control {
  display: flex;
  background: var(--bg-tertiary);
  border: 1px solid var(--border-color);
  border-radius: 5px;
  overflow: hidden;
  flex: 1;
}
.seg-btn {
  flex: 1;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: none;
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 13px;
  transition: all var(--transition);
}
.seg-btn:hover { color: var(--text-primary); }
.seg-btn.active { background: var(--accent); color: #fff; }

/* ===== 工具栏缩放控件 ===== */
.toolbar-zoom {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 0 4px;
}
.toolbar-zoom .zoom-value {
  font-size: 12px;
  color: var(--text-secondary);
  min-width: 40px;
  text-align: center;
  cursor: pointer;
  padding: 4px 6px;
  border-radius: 4px;
  transition: all var(--transition);
}
.toolbar-zoom .zoom-value:hover { background: var(--bg-hover); color: var(--text-primary); }

.zoom-btn {
  width: 26px;
  height: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: none;
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  border-radius: 4px;
  font-size: 14px;
  transition: all var(--transition);
}
.zoom-btn:hover { background: var(--bg-hover); color: var(--text-primary); }

/* ===== 画布标尺 ===== */
.ruler-corner {
  position: absolute;
  top: 0;
  left: 0;
  width: 24px;
  height: 24px;
  background: var(--bg-tertiary);
  border-right: 1px solid var(--border-color);
  border-bottom: 1px solid var(--border-color);
  z-index: 20;
}

.ruler-h-wrap {
  position: absolute;
  top: 0;
  left: 24px;
  right: 0;
  height: 24px;
  overflow: hidden;
  z-index: 15;
  background: var(--bg-tertiary);
  border-bottom: 1px solid var(--border-color);
}

.ruler-v-wrap {
  position: absolute;
  top: 24px;
  left: 0;
  bottom: 0;
  width: 24px;
  overflow: hidden;
  z-index: 15;
  background: var(--bg-tertiary);
  border-right: 1px solid var(--border-color);
}

.ruler-h-wrap canvas, .ruler-v-wrap canvas {
  display: block;
}

.canvas-area.has-ruler .canvas-wrapper {
  margin-top: 24px;
  margin-left: 24px;
}

/* ===== 侧边栏三级 Tab 图标化 ===== */
.sidebar-tabs {
  display: flex;
  border-bottom: 1px solid var(--border-color);
  flex-shrink: 0;
}

.sidebar-tab {

  padding: 8px 0;

.sidebar-tab .tab-icon { font-size: 15px; }
.sidebar-tab .tab-label { font-size: 10px; }
</style>

<body>

<!-- Toast 通知容器 -->
<div class="toast-container" id="toastContainer"></div>

<script>
// ===================================================================
//  全局状态
// ===================================================================
let currentFilePath = null;       // 当前编辑的文件路径
let selectedElement = null;       // 当前选中的 iframe 内元素
let currentDir = null;            // 当前浏览的目录
let undoStack = [];               // 撤销栈
let redoStack = [];               // 重做栈
let isDirty = false;              // 是否有未保存的修改
let recentFiles = JSON.parse(localStorage.getItem('recentFiles') || '[]'); // 最近文件

// ===================================================================
//  工具函数
// ===================================================================
function showToast(msg, type = 'info') {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function $(id) { return document.getElementById(id); }

function toggleSidebar() {
  $('sidebar').classList.toggle('collapsed');
}

function togglePanel() {
  $('panel').classList.toggle('collapsed');
}

// ===================================================================
//  文件浏览
// ===================================================================
// 从当前地址栏获取默认路径或用空
$('dirInput').addEventListener('keydown', e => { if (e.key === 'Enter') loadDirectory(); });

async function loadDirectory(dir) {
  const dirPath = dir || $('dirInput').value.trim();
  if (!dirPath) { showToast('请输入目录路径', 'error'); return; }

  try {
    const res = await fetch('/api/files?dir=' + encodeURIComponent(dirPath));
    const data = await res.json();
    if (!res.ok) { showToast(data.error, 'error'); return; }

    currentDir = data.dir;
    $('dirInput').value = data.dir;
    // 记忆目录到 localStorage
    localStorage.setItem('lastDir', data.dir);
    renderFileTree(data.items, data.dir);
  } catch (e) {
    showToast('连接服务器失败', 'error');
  }
}

function renderFileTree(items, parentDir) {
  const tree = $('fileTree');

  // 始终显示返回上级按钮（修复空文件夹 Bug）
  let html = '';
  const parent = parentDir.replace(/\\/g, '/');
  const parentParts = parent.split('/');
  if (parentParts.length > 1) {
    const upDir = parentParts.slice(0, -1).join('/');
    html += `<div class="file-item" onclick="loadDirectory('${upDir.replace(/'/g, "\\'")}')">
      <span class="icon">⬆️</span><span class="name">.. 返回上级</span>
    </div>`;
  }

  if (!items.length) {
    html += '<div class="file-tree-empty">此目录下没有 HTML 文件</div>';
    tree.innerHTML = html;
    return;
  }

  for (const item of items) {
    const escapedPath = item.path.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    if (item.type === 'directory') {
      html += `<div class="file-item" onclick="loadDirectory('${escapedPath}')">
        <span class="icon">📁</span><span class="name">${item.name}</span>
      </div>`;
    } else {
      html += `<div class="file-item" data-path="${item.path}" onclick="openFile('${escapedPath}')">
        <span class="icon">📄</span><span class="name">${item.name}</span>
      </div>`;
    }
  }
  tree.innerHTML = html;
}

// ===================================================================
//  打开文件 / 渲染预览
// ===================================================================
async function openFile(filePath) {
  if (isDirty) {
    if (!confirm('当前文件有未保存的修改，是否放弃？')) return;
  }

  try {
    const res = await fetch('/api/file?path=' + encodeURIComponent(filePath));
    const data = await res.json();
    if (!res.ok) { showToast(data.error, 'error'); return; }

    currentFilePath = data.path;
    isDirty = false;
    undoStack = [];
    redoStack = [];
    updateUndoRedoButtons();

    // 更新文件名显示
    const fileName = data.path.split(/[\\\/]/).pop();
    $('currentFileName').textContent = fileName;
    $('currentFileName').classList.add('active');
    $('btnSave').disabled = false;

    // 高亮当前文件
    document.querySelectorAll('.file-item').forEach(el => {
      el.classList.toggle('active', el.dataset.path === data.path);
    });

    // 加载到 iframe
    loadPreview(data.path);
    // 记录到最近文件
    addRecentFile(data.path, fileName);
    showToast('已打开: ' + fileName, 'success');

  } catch (e) {
    showToast('打开文件失败', 'error');
  }
}

function loadPreview(filePath) {
  $('emptyState').style.display = 'none';
  $('canvasFrame').style.display = 'block';

  const iframe = $('previewFrame');
  iframe.src = '/preview?path=' + encodeURIComponent(filePath);

  iframe.onload = () => {
    setupIframeInteraction();
    clearSelection();
  };
}

// ===================================================================
//  iframe 内交互：选择、编辑、拖拽
// ===================================================================
let highlightOverlay = null; // 高亮覆盖层

function setupIframeInteraction() {
  const iframe = $('previewFrame');
  const doc = iframe.contentDocument;
  if (!doc) return;

  // 注入高亮样式
  const style = doc.createElement('style');
  style.id = '__editor_style__';
  style.textContent = `
    .__editor-selected {
      outline: 2px solid #6c5ce7 !important;
      outline-offset: 1px;
      cursor: move;
    }
    .__editor-hover {
      outline: 1px dashed rgba(108,92,231,0.5) !important;
      outline-offset: 1px;
    }
    .__editor-handle {
      position: absolute;
      width: 8px;
      height: 8px;
      background: #6c5ce7;
      border: 1px solid #fff;
      border-radius: 2px;
      z-index: 99999;
      box-shadow: 0 0 3px rgba(0,0,0,0.3);
    }
    .__editor-handle-tl { cursor: nw-resize; }
    .__editor-handle-tr { cursor: ne-resize; }
    .__editor-handle-bl { cursor: sw-resize; }
    .__editor-handle-br { cursor: se-resize; }
    .__editor-handle-t  { cursor: n-resize; }
    .__editor-handle-b  { cursor: s-resize; }
    .__editor-handle-l  { cursor: w-resize; }
    .__editor-handle-r  { cursor: e-resize; }
    .__editor-guide {
      position: fixed;
      background: #ef4444;
      z-index: 99998;
      display: none;
      pointer-events: none;
    }
    .__editor-guide-v { width: 1px; top: 0; bottom: 0; }
    .__editor-guide-h { height: 1px; left: 0; right: 0; }
  `;
  doc.head.appendChild(style);

  // 点击选择元素
  doc.addEventListener('click', (e) => {
    e.preventDefault();
    e.stopPropagation();

    const el = e.target;
    if (el === doc.body || el === doc.documentElement) {
      clearSelection();
      return;
    }

    selectElement(el);
  }, true);

  // 悬停高亮
  doc.addEventListener('mouseover', (e) => {
    const el = e.target;
    if (el === selectedElement) return;
    if (el === doc.body || el === doc.documentElement) return;
    el.classList.add('__editor-hover');
  }, true);

  doc.addEventListener('mouseout', (e) => {
    e.target.classList.remove('__editor-hover');
  }, true);

  // 双击编辑文字
  doc.addEventListener('dblclick', (e) => {
    e.preventDefault();
    e.stopPropagation();
    const el = e.target;
    if (el === doc.body || el === doc.documentElement) return;

    selectElement(el);
    startInlineEdit(el);
  }, true);

  // 画布缩放支持 (Ctrl + 滚轮) - 捕获 iframe 内的事件并透传给父层
  doc.addEventListener('wheel', (e) => {
    if (e.ctrlKey || e.metaKey) {
      e.preventDefault();
      if (window.parent && window.parent.handleCanvasZoom) {
        window.parent.handleCanvasZoom(e.deltaY);
      }
    }
  }, { passive: false });

  doc.addEventListener('keydown', (e) => {
    if (e.ctrlKey && (e.key === '0' || e.key === 'NumPad0')) {
      e.preventDefault();
      if (window.parent && window.parent.resetCanvasZoom) {
        window.parent.resetCanvasZoom();
      }
    }
  });

  // 拖拽逻辑（含智能对齐辅助线）
  let dragEl = null, dragStartX, dragStartY, origLeft, origTop, origPosition;
  let guideLines = []; // 辅助线 DOM 元素

  // 创建辅助线元素
  function ensureGuideLines() {
    if (guideLines.length) return;
    for (let i = 0; i < 6; i++) {
      const g = doc.createElement('div');
      g.className = '__editor-guide ' + (i < 3 ? '__editor-guide-v' : '__editor-guide-h');
      doc.body.appendChild(g);
      guideLines.push(g);
    }
  }

  function hideGuides() {
    guideLines.forEach(g => g.style.display = 'none');
  }

  function checkAlignment(draggedRect) {
    hideGuides();
    const THRESHOLD = 5;
    const siblings = Array.from(doc.body.children).filter(el =>
      el !== dragEl && !el.className.includes('__editor-') && el.offsetWidth > 0
    );
    let gi = 0;
    let snapX = null, snapY = null;
    const dCx = draggedRect.left + draggedRect.width / 2;
    const dCy = draggedRect.top + draggedRect.height / 2;

    for (const sib of siblings) {
      const r = sib.getBoundingClientRect();
      const sCx = r.left + r.width / 2;
      const sCy = r.top + r.height / 2;

      // 垂直线对齐
      const vChecks = [
        { d: draggedRect.left, s: r.left },
        { d: draggedRect.right, s: r.right },
        { d: dCx, s: sCx },
      ];
      for (const vc of vChecks) {
        if (Math.abs(vc.d - vc.s) <= THRESHOLD && gi < 3) {
          guideLines[gi].style.left = vc.s + 'px';
          guideLines[gi].style.display = 'block';
          snapX = vc.s - (vc.d - draggedRect.left) + origLeft;
          gi++;
          break;
        }
      }
      // 水平线对齐
      const hChecks = [
        { d: draggedRect.top, s: r.top },
        { d: draggedRect.bottom, s: r.bottom },
        { d: dCy, s: sCy },
      ];
      for (const hc of hChecks) {
        if (Math.abs(hc.d - hc.s) <= THRESHOLD && gi < 6) {
          guideLines[gi].style.top = hc.s + 'px';
          guideLines[gi].style.display = 'block';
          snapY = hc.s - (hc.d - draggedRect.top) + origTop;
          gi++;
          break;
        }
      }
    }
    return { snapX, snapY };
  }

  doc.addEventListener('mousedown', (e) => {
    // 检查是否点击了 resize handle
    if (e.target.className && e.target.className.includes('__editor-handle')) {
      startResize(e, doc);
      return;
    }

    if (!selectedElement || e.target !== selectedElement) return;
    if (selectedElement.isContentEditable) return;

    dragEl = selectedElement;
    const rect = dragEl.getBoundingClientRect();
    dragStartX = e.clientX;
    dragStartY = e.clientY;

    const cs = doc.defaultView.getComputedStyle(dragEl);
    origPosition = cs.position;

    if (origPosition === 'static') {
      dragEl.style.position = 'relative';
    }

    origLeft = parseInt(cs.left) || 0;
    origTop = parseInt(cs.top) || 0;
    ensureGuideLines();
    e.preventDefault();
  }, true);

  doc.addEventListener('mousemove', (e) => {
    if (!dragEl) return;
    let dx = e.clientX - dragStartX;
    let dy = e.clientY - dragStartY;
    let newLeft = origLeft + dx;
    let newTop = origTop + dy;

    dragEl.style.left = newLeft + 'px';
    dragEl.style.top = newTop + 'px';

    // 智能对齐
    const rect = dragEl.getBoundingClientRect();
    const snap = checkAlignment(rect);
    if (snap.snapX !== null) dragEl.style.left = snap.snapX + 'px';
    if (snap.snapY !== null) dragEl.style.top = snap.snapY + 'px';
  }, true);

  doc.addEventListener('mouseup', () => {
    if (dragEl) {
      hideGuides();
      pushUndo();
      markDirty();
      updatePanel();
      dragEl = null;
    }
  }, true);
}

// ===================================================================
//  元素选择 & 属性面板
// ===================================================================
function selectElement(el) {
  const doc = $('previewFrame').contentDocument;
  if (!doc) return;

  // 清除之前的选中 + resize handles
  doc.querySelectorAll('.__editor-selected').forEach(e => e.classList.remove('__editor-selected'));
  removeResizeHandles(doc);

  selectedElement = el;
  el.classList.add('__editor-selected');
  el.classList.remove('__editor-hover');

  // 显示属性面板
  $('panelEmpty').style.display = 'none';
  $('panelContent').style.display = 'block';

  // 添加 resize handles
  addResizeHandles(el, doc);

  // 更新页面跳转配置
  updateLinkSection(el);

  updatePanel();
}

function clearSelection() {
  const doc = $('previewFrame').contentDocument;
  if (doc) {
    doc.querySelectorAll('.__editor-selected').forEach(e => e.classList.remove('__editor-selected'));
    removeResizeHandles(doc);
  }
  selectedElement = null;
  $('panelEmpty').style.display = 'block';
  $('panelContent').style.display = 'none';
}

// ===================================================================
//  Resize Handles
// ===================================================================
function addResizeHandles(el, doc) {
  const positions = ['tl','t','tr','r','br','b','bl','l'];
  const rect = el.getBoundingClientRect();
  const scrollX = doc.documentElement.scrollLeft || 0;
  const scrollY = doc.documentElement.scrollTop || 0;

  positions.forEach(pos => {
    const h = doc.createElement('div');
    h.className = '__editor-handle __editor-handle-' + pos;
    h.dataset.handlePos = pos;

    let left, top;
    switch(pos) {
      case 'tl': left = rect.left - 4; top = rect.top - 4; break;
      case 't':  left = rect.left + rect.width/2 - 4; top = rect.top - 4; break;
      case 'tr': left = rect.right - 4; top = rect.top - 4; break;
      case 'r':  left = rect.right - 4; top = rect.top + rect.height/2 - 4; break;
      case 'br': left = rect.right - 4; top = rect.bottom - 4; break;
      case 'b':  left = rect.left + rect.width/2 - 4; top = rect.bottom - 4; break;
      case 'bl': left = rect.left - 4; top = rect.bottom - 4; break;
      case 'l':  left = rect.left - 4; top = rect.top + rect.height/2 - 4; break;
    }
    h.style.left = (left + scrollX) + 'px';
    h.style.top = (top + scrollY) + 'px';
    doc.body.appendChild(h);
  });
}

function removeResizeHandles(doc) {
  doc.querySelectorAll('.__editor-handle').forEach(h => h.remove());
}

function repositionHandles() {
  if (!selectedElement) return;
  const doc = $('previewFrame').contentDocument;
  if (!doc) return;
  removeResizeHandles(doc);
  addResizeHandles(selectedElement, doc);
}

// Resize interaction
let resizeData = null;

function startResize(e, doc) {
  if (!selectedElement) return;
  const pos = e.target.dataset.handlePos;
  const rect = selectedElement.getBoundingClientRect();
  const cs = doc.defaultView.getComputedStyle(selectedElement);

  resizeData = {
    pos,
    startX: e.clientX,
    startY: e.clientY,
    origWidth: parseInt(cs.width) || rect.width,
    origHeight: parseInt(cs.height) || rect.height,
    el: selectedElement,
    doc
  };

  const onMove = (ev) => {
    if (!resizeData) return;
    const dx = ev.clientX - resizeData.startX;
    const dy = ev.clientY - resizeData.startY;
    const p = resizeData.pos;

    if (p.includes('r') || p === 't' || p === 'b') {
      if (p.includes('r')) resizeData.el.style.width = Math.max(20, resizeData.origWidth + dx) + 'px';
    }
    if (p.includes('l')) {
      resizeData.el.style.width = Math.max(20, resizeData.origWidth - dx) + 'px';
    }
    if (p.includes('b') || p === 'l' || p === 'r') {
      if (p.includes('b')) resizeData.el.style.height = Math.max(20, resizeData.origHeight + dy) + 'px';
    }
    if (p.includes('t')) {
      resizeData.el.style.height = Math.max(20, resizeData.origHeight - dy) + 'px';
    }
    // 边中只调整单方向
    if (p === 'r' || p === 'l') {
      resizeData.el.style.width = Math.max(20, resizeData.origWidth + (p === 'r' ? dx : -dx)) + 'px';
    }
    if (p === 't' || p === 'b') {
      resizeData.el.style.height = Math.max(20, resizeData.origHeight + (p === 'b' ? dy : -dy)) + 'px';
    }

    repositionHandles();
  };

  const onUp = () => {
    doc.removeEventListener('mousemove', onMove, true);
    doc.removeEventListener('mouseup', onUp, true);
    pushUndo();
    markDirty();
    updatePanel();
    resizeData = null;
  };

  doc.addEventListener('mousemove', onMove, true);
  doc.addEventListener('mouseup', onUp, true);
  e.preventDefault();
  e.stopPropagation();
}

// ===================================================================
//  页面跳转链接配置 (Phase 6)
// ===================================================================
function updateLinkSection(el) {
  const tag = el.tagName.toLowerCase();
  const isLinkable = (tag === 'a' || tag === 'button' || tag === 'div' || tag === 'span');
  $('linkSection').style.display = isLinkable ? 'block' : 'none';

  if (!isLinkable) return;

  // 填充同项目内的 HTML 文件列表
  const select = $('propPageLink');
  select.innerHTML = '<option value="">-- 不设置 --</option>';

  const fileItems = document.querySelectorAll('#fileTree .file-item[data-path]');
  fileItems.forEach(item => {
    const path = item.dataset.path;
    const name = item.querySelector('.name')?.textContent || path;
    if (path && path.endsWith('.html')) {
      const opt = document.createElement('option');
      opt.value = name;
      opt.textContent = name;
      select.appendChild(opt);
    }
  });

  // 回显当前值
  const currentHref = el.getAttribute('href') || el.getAttribute('onclick') || '';
  for (const opt of select.options) {
    if (currentHref.includes(opt.value)) {
      opt.selected = true;
      break;
    }
  }
}

function setPageLink(value) {
  if (!selectedElement) return;
  pushUndo();
  if (selectedElement.tagName.toLowerCase() === 'a') {
    selectedElement.setAttribute('href', value || '#');
  } else {
    if (value) {
      selectedElement.setAttribute('onclick', `window.location.href='${value}'`);
      selectedElement.style.cursor = 'pointer';
    } else {
      selectedElement.removeAttribute('onclick');
      selectedElement.style.cursor = '';
    }
  }
  markDirty();
}

function updatePanel() {
  const el = selectedElement;
  if (!el) return;

  const cs = el.ownerDocument.defaultView.getComputedStyle(el);

  // 元素信息头 (现在是 span 而非 input)
  $('propTag').textContent = el.tagName.toLowerCase();
  $('propId').textContent = el.id ? '#' + el.id : '';
  $('propClass').textContent = el.className.replace(/__editor-\w+/g, '').trim() || '';

  // 文字:只取直接文本子节点
  const directText = Array.from(el.childNodes)
    .filter(n => n.nodeType === Node.TEXT_NODE)
    .map(n => n.textContent)
    .join('');
  $('propText').value = el.children.length === 0 ? el.textContent : directText;

  $('propFontSize').value = parseInt(cs.fontSize) || '';
  $('propLineHeight').value = cs.lineHeight === 'normal' ? '' : cs.lineHeight;
  $('propFontWeight').value = fontWeightToValue(cs.fontWeight);

  // 分段控制器更新
  updateTextAlignSegments(cs.textAlign);

  $('propColor').value = rgbToHex(cs.color);
  $('propColorText').value = rgbToHex(cs.color);
  const textSwatch = $('textSwatch');
  if (textSwatch) textSwatch.style.background = rgbToHex(cs.color);

  const bgHex = cs.backgroundColor === 'rgba(0, 0, 0, 0)' ? '#ffffff' : rgbToHex(cs.backgroundColor);
  $('propBgColor').value = bgHex;
  $('propBgColorText').value = cs.backgroundColor === 'rgba(0, 0, 0, 0)' ? 'transparent' : bgHex;
  const bgSwatch = $('bgSwatch');
  if (bgSwatch) bgSwatch.style.background = bgHex;

  $('propMarginTop').value = parseInt(cs.marginTop) || 0;
  $('propMarginRight').value = parseInt(cs.marginRight) || 0;
  $('propMarginBottom').value = parseInt(cs.marginBottom) || 0;
  $('propMarginLeft').value = parseInt(cs.marginLeft) || 0;

  $('propPaddingTop').value = parseInt(cs.paddingTop) || 0;
  $('propPaddingRight').value = parseInt(cs.paddingRight) || 0;
  $('propPaddingBottom').value = parseInt(cs.paddingBottom) || 0;
  $('propPaddingLeft').value = parseInt(cs.paddingLeft) || 0;

  $('propWidth').value = el.style.width || cs.width;
  $('propHeight').value = el.style.height || cs.height;

  $('propBorderRadius').value = cs.borderRadius;
  $('propBorder').value = cs.border === 'none' ? '' : cs.border;

  $('propDisplay').value = cs.display;
  $('propOpacity').value = parseFloat(cs.opacity);
}

// ===================================================================
//  面板属性变更 → 实时应用
// ===================================================================
function bindPanelEvents() {
  // 文字内容
  $('propText').addEventListener('input', () => {
    if (!selectedElement) return;
    pushUndo();
    if (selectedElement.children.length === 0) {
      selectedElement.textContent = $('propText').value;
    } else {
      // 只修改第一个文本节点
      const tn = Array.from(selectedElement.childNodes).find(n => n.nodeType === Node.TEXT_NODE);
      if (tn) tn.textContent = $('propText').value;
    }
    markDirty();
  });

  // 字号
  $('propFontSize').addEventListener('input', () => applyStyle('fontSize', $('propFontSize').value + 'px'));
  $('propLineHeight').addEventListener('input', () => applyStyle('lineHeight', $('propLineHeight').value));
  $('propFontWeight').addEventListener('change', () => applyStyle('fontWeight', $('propFontWeight').value));
  // textAlign 由 segmented control 处理，无需 addEventListener

  // 颜色
  $('propColor').addEventListener('input', () => {
    $('propColorText').value = $('propColor').value;
    const ts = $('textSwatch');
    if (ts) ts.style.background = $('propColor').value;
    applyStyle('color', $('propColor').value);
  });
  $('propColorText').addEventListener('change', () => {
    $('propColor').value = $('propColorText').value;
    applyStyle('color', $('propColorText').value);
  });
  $('propBgColor').addEventListener('input', () => {
    $('propBgColorText').value = $('propBgColor').value;
    const bs = $('bgSwatch');
    if (bs) bs.style.background = $('propBgColor').value;
    applyStyle('backgroundColor', $('propBgColor').value);
  });
  $('propBgColorText').addEventListener('change', () => {
    const bs = $('bgSwatch');
    if (bs) bs.style.background = $('propBgColorText').value;
    applyStyle('backgroundColor', $('propBgColorText').value);
  });

  // 间距
  ['marginTop','marginRight','marginBottom','marginLeft','paddingTop','paddingRight','paddingBottom','paddingLeft'].forEach(prop => {
    const id = 'prop' + prop.charAt(0).toUpperCase() + prop.slice(1);
    $(id).addEventListener('input', () => applyStyle(prop, $(id).value + 'px'));
  });

  // 尺寸
  $('propWidth').addEventListener('change', () => applyStyle('width', normalizeSizeValue($('propWidth').value)));
  $('propHeight').addEventListener('change', () => applyStyle('height', normalizeSizeValue($('propHeight').value)));

  // 边框
  $('propBorderRadius').addEventListener('change', () => applyStyle('borderRadius', $('propBorderRadius').value));
  $('propBorder').addEventListener('change', () => applyStyle('border', $('propBorder').value));

  // 显示
  $('propDisplay').addEventListener('change', () => applyStyle('display', $('propDisplay').value));
  $('propOpacity').addEventListener('input', () => applyStyle('opacity', $('propOpacity').value));
}

function applyStyle(prop, value) {
  if (!selectedElement) return;
  pushUndo();
  selectedElement.style[prop] = value;
  markDirty();
}

function normalizeSizeValue(v) {
  if (!v || v === 'auto') return 'auto';
  if (/^\d+$/.test(v)) return v + 'px';
  return v;
}

// ===================================================================
//  行内编辑
// ===================================================================
function startInlineEdit(el) {
  pushUndo();
  el.contentEditable = 'true';
  el.focus();
  el.style.outline = '2px solid #6c5ce7';

  const done = () => {
    el.contentEditable = 'false';
    markDirty();
    updatePanel();
  };

  el.addEventListener('blur', done, { once: true });
  el.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' || e.key === 'Enter') {
      e.preventDefault();
      el.blur();
    }
  });
}

// ===================================================================
//  撤销 / 重做
// ===================================================================
function getIframeHTML() {
  const doc = $('previewFrame').contentDocument;
  if (!doc) return '';
  // 去除编辑器注入的样式和类
  const clone = doc.documentElement.cloneNode(true);
  const editorStyle = clone.querySelector('#__editor_style__');
  if (editorStyle) editorStyle.remove();
  clone.querySelectorAll('.__editor-selected').forEach(e => e.classList.remove('__editor-selected'));
  clone.querySelectorAll('.__editor-hover').forEach(e => e.classList.remove('__editor-hover'));
  // 去掉注入的 base 标签
  const base = clone.querySelector('base');
  if (base) base.remove();
  return '<!DOCTYPE html>\n' + clone.outerHTML;
}

function pushUndo() {
  const html = getIframeHTML();
  undoStack.push(html);
  redoStack = [];
  if (undoStack.length > 50) undoStack.shift();
  updateUndoRedoButtons();
}

function doUndo() {
  if (!undoStack.length) return;
  redoStack.push(getIframeHTML());
  const html = undoStack.pop();
  restoreHTML(html);
  updateUndoRedoButtons();
}

function doRedo() {
  if (!redoStack.length) return;
  undoStack.push(getIframeHTML());
  const html = redoStack.pop();
  restoreHTML(html);
  updateUndoRedoButtons();
}

function restoreHTML(html) {
  const doc = $('previewFrame').contentDocument;
  if (!doc) return;
  doc.open();
  doc.write(html);
  doc.close();
  clearSelection();
  setupIframeInteraction();
  markDirty();
}

function updateUndoRedoButtons() {
  $('btnUndo').disabled = undoStack.length === 0;
  $('btnRedo').disabled = redoStack.length === 0;
}

// ===================================================================
//  保存
// ===================================================================
async function doSave() {
  if (!currentFilePath) { showToast('没有打开的文件', 'error'); return; }

  const html = getIframeHTML();

  try {
    const res = await fetch('/api/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ filePath: currentFilePath, content: html })
    });
    const data = await res.json();
    if (!res.ok) { showToast(data.error, 'error'); return; }

    isDirty = false;
    showToast('✅ 保存成功！', 'success');
  } catch (e) {
    showToast('保存失败: ' + e.message, 'error');
  }
}

function markDirty() {
  isDirty = true;
}

// ===================================================================
//  设备预览切换 & 适应内容
// ===================================================================
function setDevice(btn, w, h) {
  document.querySelectorAll('.device-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  const frame = $('canvasFrame');
  if (w === '100%') {
    frame.style.width = '100%';
    frame.style.height = '100%';
    frame.style.borderRadius = '0';
  } else {
    frame.style.width = w + 'px';
    frame.style.height = h + 'px';
    frame.style.borderRadius = '8px';
  }
  
  // 切换设备后，也重置平移和缩放，使其居中
  resetCanvasZoom();
}

function autoFitCanvas(btn) {
  if (btn) {
    document.querySelectorAll('.device-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  const iframe = $('previewFrame');
  const doc = iframe.contentDocument;
  if (!doc || !doc.body) return;

  const frame = $('canvasFrame');
  
  // 测量内容真实滚动宽高
  const w = Math.max(doc.body.scrollWidth, doc.documentElement.scrollWidth, doc.body.offsetWidth);
  const h = Math.max(doc.body.scrollHeight, doc.documentElement.scrollHeight, doc.body.offsetHeight);
  
  // 设置为实际内容宽高即可消除内部滚动条，看全整个页面
  frame.style.width = w + 'px';
  frame.style.height = h + 'px';
  frame.style.borderRadius = '8px';
  
  showToast(`已适应页面真实内容大小: ${w} × ${h}`, 'success');
}

function deleteSelected() {
  if (!selectedElement) return;
  if (!confirm('确定删除这个元素吗？')) return;
  pushUndo();
  selectedElement.remove();
  clearSelection();
  markDirty();
  showToast('已删除元素', 'info');
}

// ===================================================================
//  颜色工具函数
// ===================================================================
function rgbToHex(rgb) {
  if (!rgb || rgb === 'transparent' || rgb === 'rgba(0, 0, 0, 0)') return '#ffffff';
  const m = rgb.match(/\d+/g);
  if (!m || m.length < 3) return '#000000';
  return '#' + m.slice(0, 3).map(x => parseInt(x).toString(16).padStart(2, '0')).join('');
}

function fontWeightToValue(fw) {
  const n = parseInt(fw);
  if (n <= 400) return 'normal';
  if (n <= 500) return '500';
  if (n <= 600) return '600';
  return 'bold';
}

// ===================================================================
//  快捷键、画布缩放与无限画布平移
// ===================================================================
let canvasZoom = 1;
let panX = 0;
let panY = 0;

function updateCanvasTransform() {
  const frame = $('canvasFrame');
  // 平移和缩放组合，中心点(transformOrigin)设置为正中，以防缩放时跳变
  frame.style.transform = `translate(${panX}px, ${panY}px) scale(${canvasZoom})`;
  frame.style.transformOrigin = 'center center';
  
  // 让背景图跟着稍微偏移，产生无限画布视觉错觉
  $('canvasWrapper').style.backgroundPosition = `${panX}px ${panY}px`;
}

function handleCanvasZoom(deltaY, clientX, clientY) {
  const wrapper = $('canvasWrapper');
  const rect = wrapper.getBoundingClientRect();
  
  // 如果没有传入 clientX/Y (如 iframe 内部事件透传)，则默认以画布中心缩放
  let mouseX = 0;
  let mouseY = 0;
  
  if (clientX !== undefined && clientY !== undefined) {
    mouseX = clientX - rect.left - rect.width / 2;
    mouseY = clientY - rect.top - rect.height / 2;
  }

  // 根据滚动量平滑计算缩放倍率
  const zoomFactor = Math.exp(-deltaY * 0.0015);
  const newZoom = Math.max(0.1, Math.min(10.0, canvasZoom * zoomFactor));
  
  // 始终保持鼠标指向的内容位置不变计算新平移量
  const scaleRatio = newZoom / canvasZoom;
  panX = mouseX - (mouseX - panX) * scaleRatio;
  panY = mouseY - (mouseY - panY) * scaleRatio;
  
  canvasZoom = newZoom;
  updateCanvasTransform();
  showZoomIndicator();
}

function showZoomIndicator() {
  // 更新工具栏常驻缩放显示
  const zd = $('zoomDisplay');
  if (zd) zd.textContent = Math.round(canvasZoom * 100) + '%';
  
  // 画布标尺同步更新
  drawRulers();
}

function resetCanvasZoom() {
  canvasZoom = 1;
  panX = 0;
  panY = 0;
  updateCanvasTransform();
  showZoomIndicator();
}

function zoomIn() {
  handleCanvasZoom(-200);
}

function zoomOut() {
  handleCanvasZoom(200);
}

// 监听外层 Wrapper 的滚轮事件
$('canvasWrapper').addEventListener('wheel', (e) => {
  e.preventDefault(); // 禁用原生滚动
  if (e.ctrlKey || e.metaKey) {
    handleCanvasZoom(e.deltaY, e.clientX, e.clientY);
  } else {
    // 没按 Ctrl，作为普通的画布平移 (支持双指滑动 / 普通鼠标滚轮)
    panX -= e.deltaX;
    panY -= e.deltaY;
    updateCanvasTransform();
  }
}, { passive: false });

// 鼠标中键 / 空格键拖拽画布
let isPanDragging = false;
let isSpaceDown = false;
let dragStartX = 0;
let dragStartY = 0;

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA' && !e.target.isContentEditable) {
    isSpaceDown = true;
    $('canvasWrapper').style.cursor = 'grab';
    e.preventDefault(); // 防止页面跳动
  }
  
  if (e.ctrlKey && e.key === 's') { e.preventDefault(); doSave(); }
  if (e.ctrlKey && e.key === 'z') { e.preventDefault(); doUndo(); }
  if (e.ctrlKey && e.key === 'y') { e.preventDefault(); doRedo(); }
  if (e.ctrlKey && (e.key === '0' || e.key === 'NumPad0')) { e.preventDefault(); resetCanvasZoom(); }
  if (e.key === 'Delete' && selectedElement) { deleteSelected(); }
  if (e.key === 'Escape') { clearSelection(); }
});

document.addEventListener('keyup', (e) => {
  if (e.code === 'Space') {
    isSpaceDown = false;
    $('canvasWrapper').style.cursor = '';
  }
});

$('canvasWrapper').addEventListener('mousedown', (e) => {
  // 鼠标中键 (1) 或者是空格 + 任意点击
  if (e.button === 1 || isSpaceDown) {
    isPanDragging = true;
    dragStartX = e.clientX - panX;
    dragStartY = e.clientY - panY;
    $('canvasWrapper').style.cursor = 'grabbing';
    e.preventDefault();
  }
});

window.addEventListener('mousemove', (e) => {
  if (isPanDragging) {
    panX = e.clientX - dragStartX;
    panY = e.clientY - dragStartY;
    updateCanvasTransform();
  }
});

window.addEventListener('mouseup', (e) => {
  if (isPanDragging) {
    isPanDragging = false;
    $('canvasWrapper').style.cursor = isSpaceDown ? 'grab' : '';
  }
});

// ===================================================================
//  拖拽改变画布尺寸
// ===================================================================
function setupCanvasResizer() {
  const frame = $('canvasFrame');
  if (!frame) return;
  
  let isResizing = false;
  let resizeDir = '';
  let startX = 0;
  let startY = 0;
  let startW = 0;
  let startH = 0;
  let startPanX = 0;
  let startPanY = 0;
  
  frame.addEventListener('mousedown', (e) => {
    if (e.target.classList.contains('canvas-resizer')) {
      isResizing = true;
      resizeDir = e.target.getAttribute('data-resize');
      startX = e.clientX;
      startY = e.clientY;
      startW = frame.offsetWidth;
      startH = frame.offsetHeight;
      startPanX = panX;
      startPanY = panY;
      
      frame.classList.add('resizing');
      e.target.classList.add('active');
      
      e.preventDefault();
      e.stopPropagation();
    }
  });
  
  window.addEventListener('mousemove', (e) => {
    if (isResizing) {
      // 变化量需考虑缩放系数
      const dx = (e.clientX - startX) / canvasZoom;
      const dy = (e.clientY - startY) / canvasZoom;
      
      let newW = startW;
      let newH = startH;
      let diffW = 0;
      let diffH = 0;
      
      if (resizeDir.includes('r')) {
        newW = Math.max(320, startW + dx);
        diffW = newW - startW;
        frame.style.width = newW + 'px';
      }
      if (resizeDir.includes('b')) {
        newH = Math.max(320, startH + dy);
        diffH = newH - startH;
        frame.style.height = newH + 'px';
      }
      
      // 因为 wrapper 是居中布局，调整长宽时中心点会移动，
      // 我们需要反向平移让“左上角”视觉上固定，以防鼠标和边框产生脱节偏移。
      // width 增加了 diffW，由于是向两边生长，右侧实际只移动了 diffW/2。
      // 我们补强平移 panX 增加 (diffW/2) * zoom，就能让右侧直接随鼠标移动完成 100% 拖拽跨度。
      panX = startPanX + (diffW / 2) * canvasZoom;
      panY = startPanY + (diffH / 2) * canvasZoom;
      updateCanvasTransform();
      
      // 更新拖拽尺寸提示
      let indicator = $('zoomIndicator');
      if (indicator) {
        indicator.textContent = `画布尺寸: ${Math.round(newW)} × ${Math.round(newH)}`;
        indicator.style.opacity = '1';
        clearTimeout(indicator.timer);
        indicator.timer = setTimeout(() => { indicator.style.opacity = '0'; }, 1000);
      }
      
      e.preventDefault();
      e.stopPropagation();
    }
  });
  
  window.addEventListener('mouseup', (e) => {
    if (isResizing) {
      isResizing = false;
      frame.classList.remove('resizing');
      frame.querySelectorAll('.canvas-resizer').forEach(el => el.classList.remove('active'));
    }
  });
}

// ===================================================================
//  最近文件管理
// ===================================================================
function addRecentFile(filePath, fileName) {
  recentFiles = recentFiles.filter(f => f.path !== filePath);
  recentFiles.unshift({ path: filePath, name: fileName, time: Date.now() });
  if (recentFiles.length > 10) recentFiles.pop();
  localStorage.setItem('recentFiles', JSON.stringify(recentFiles));
  renderRecentFiles();
}

function renderRecentFiles() {
  const wrap = $('recentFilesWrap');
  const list = $('recentFilesList');
  if (!recentFiles.length) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  list.innerHTML = recentFiles.slice(0, 5).map(f => {
    const escapedPath = f.path.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    return `<div class="file-item" onclick="openFile('${escapedPath}')" style="padding:5px 16px;font-size:12px;">
      <span class="icon" style="font-size:12px;">📄</span><span class="name">${f.name}</span>
    </div>`;
  }).join('');
}

function clearRecentFiles() {
  recentFiles = [];
  localStorage.removeItem('recentFiles');
  renderRecentFiles();
}

function switchSidebarTab(tabName) {
  const tabs = ['files', 'layers', 'components'];
  const panels = ['panelFiles', 'panelLayers', 'panelComponents'];
  document.querySelectorAll('.sidebar-tab').forEach((btn, i) => {
    btn.classList.toggle('active', tabs[i] === tabName);
  });
  panels.forEach((id, i) => {
    $(id).classList.toggle('active', tabs[i] === tabName);
  });
  // 自动刷新图层树
  if (tabName === 'layers') refreshLayerTree();
}

// ===================================================================
function renderComponentPanel(filter = '') {
  const tree = $('compTree');
  const lowerFilter = filter.toLowerCase();
  let html = '';

  COMPONENT_LIBRARY.forEach((group, gi) => {
    const filteredItems = group.items.filter(item =>
      !lowerFilter || item.name.toLowerCase().includes(lowerFilter)
    );
    if (!filteredItems.length) return;

    html += `<button class="comp-group-title" onclick="toggleCompGroup(this)">
      <span>${group.icon} ${group.category}</span>
      <span class="arrow">▼</span>
    </button>`;
    html += `<div class="comp-group-items">`;
    filteredItems.forEach((item, ii) => {
      html += `<div class="comp-item" draggable="true"
        ondragstart="onCompDragStart(event, ${gi}, ${group.items.indexOf(item)})">
        <span class="comp-icon">${group.icon}</span>
        <span>${item.name}</span>
      </div>`;
    });
    html += `</div>`;
  });

  tree.innerHTML = html || '<div class="file-tree-empty">没有匹配的组件</div>';
}

function toggleCompGroup(btn) {
  btn.classList.toggle('collapsed');
  const items = btn.nextElementSibling;
  if (items) items.classList.toggle('collapsed');
}

function filterComponents() {
  renderComponentPanel($('compSearchInput').value.trim());
}

// ===================================================================
//  组件拖拽 (Phase 4 核心 - 跨 iframe 解决方案)
// ===================================================================
let dragComponentData = null;

function onCompDragStart(e, groupIdx, itemIdx) {
  dragComponentData = COMPONENT_LIBRARY[groupIdx].items[itemIdx];
  e.dataTransfer.effectAllowed = 'copy';
  e.dataTransfer.setData('text/plain', 'component');
  // 显示透明遮罩层截获拖拽事件
  const overlay = $('dropOverlay');
  if (overlay) overlay.classList.add('active');
}

// 画布区域接收拖拽
function setupCanvasDrop() {
  const overlay = $('dropOverlay');

  // dragover: 允许释放 + 视觉反馈
  overlay.addEventListener('dragover', function(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'copy';
    overlay.classList.add('drag-over');
  });

  overlay.addEventListener('dragleave', function(e) {
    overlay.classList.remove('drag-over');
  });

  // drop: 插入组件到 iframe
  overlay.addEventListener('drop', function(e) {
    e.preventDefault();
    overlay.classList.remove('active', 'drag-over');

    if (!dragComponentData) return;

    const iframe = $('previewFrame');
    const doc = iframe.contentDocument;
    if (!doc || !doc.body) {
      showToast('请先打开一个 HTML 文件', 'error');
      dragComponentData = null;
      return;
    }

    pushUndo();

    // 创建临时容器解析 HTML
    const temp = doc.createElement('div');
    temp.innerHTML = dragComponentData.html;
    const newEl = temp.firstElementChild || temp.firstChild;

    if (newEl) {
      // 计算鼠标在 iframe 内的坐标，找到目标插入位置
      const iframeRect = iframe.getBoundingClientRect();
      const targetEl = doc.elementFromPoint(
        e.clientX - iframeRect.left,
        e.clientY - iframeRect.top
      );

      if (targetEl && targetEl !== doc.body && targetEl !== doc.documentElement) {
        // 在目标元素后面插入
        targetEl.parentNode.insertBefore(newEl, targetEl.nextSibling);
      } else {
        doc.body.appendChild(newEl);
      }

      // 滚动新元素到可见区域
      newEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
      selectElement(newEl);
      markDirty();
      showToast('已添加: ' + dragComponentData.name, 'success');
    }

    dragComponentData = null;
  });

  // 全局拖拽结束：清理 overlay
  document.addEventListener('dragend', function() {
    overlay.classList.remove('active', 'drag-over');
    dragComponentData = null;
  });
}

// ===================================================================
//  初始化
// ===================================================================
bindPanelEvents();
renderRecentFiles();
renderComponentPanel();
setupCanvasDrop();
setupCanvasResizer();
initRulers();

// 自动恢复上次目录
(function restoreLastDir() {
  const lastDir = localStorage.getItem('lastDir');
  if (lastDir) {
    $('dirInput').value = lastDir;
    loadDirectory(lastDir);
  }
})();

// ===================================================================
//  Phase 1: 图层树 (Layer Tree)
// ===================================================================
function refreshLayerTree() {
  const iframe = $('previewFrame');
  const doc = iframe?.contentDocument;
  const tree = $('layerTree');
  if (!doc || !doc.body) {
    tree.innerHTML = '<div class="file-tree-empty">打开文件后<br>此处显示页面 DOM 结构</div>';
    return;
  }
  tree.innerHTML = '';
  buildLayerNodes(doc.body, tree, 0);
}

function buildLayerNodes(parentEl, container, depth) {
  const children = Array.from(parentEl.children).filter(el => {
    const cn = el.className || '';
    return !cn.toString().includes('__editor-') && el.tagName !== 'SCRIPT' && el.tagName !== 'STYLE' && el.id !== '__editor_style__';
  });

  children.forEach(el => {
    const hasChildren = Array.from(el.children).filter(c => {
      const cn = c.className || '';
      return !cn.toString().includes('__editor-') && c.tagName !== 'SCRIPT' && c.tagName !== 'STYLE';
    }).length > 0;

    // 节点行
    const nodeDiv = document.createElement('div');
    nodeDiv.className = 'layer-node';
    nodeDiv.style.paddingLeft = (8 + depth * 16) + 'px';
    if (el === selectedElement) nodeDiv.classList.add('active');

    // 展开/折叠图标
    const toggle = document.createElement('span');
    toggle.className = 'layer-toggle' + (hasChildren ? '' : ' empty');
    toggle.textContent = '▼';
    nodeDiv.appendChild(toggle);

    // 标签名
    const tag = document.createElement('span');
    tag.className = 'layer-tag';
    tag.textContent = el.tagName.toLowerCase();
    nodeDiv.appendChild(tag);

    // 标签描述 (id/class/text snippet)
    const label = document.createElement('span');
    label.className = 'layer-label';
    let desc = '';
    if (el.id) desc = '#' + el.id;
    else if (el.className && typeof el.className === 'string') desc = '.' + el.className.replace(/__editor-\w+/g,'').trim().split(/\s+/)[0];
    else {
      const txt = el.textContent?.trim();
      if (txt) desc = txt.substring(0, 20) + (txt.length > 20 ? '…' : '');
    }
    label.textContent = desc;
    nodeDiv.appendChild(label);

    container.appendChild(nodeDiv);

    // 子容器
    const childrenDiv = document.createElement('div');
    childrenDiv.className = 'layer-children';
    container.appendChild(childrenDiv);

    // 点击选中
    nodeDiv.addEventListener('click', (e) => {
      e.stopPropagation();
      selectElement(el);
      // 高亮当前图层节点
      document.querySelectorAll('.layer-node').forEach(n => n.classList.remove('active'));
      nodeDiv.classList.add('active');
    });

    // 展开/折叠
    toggle.addEventListener('click', (e) => {
      e.stopPropagation();
      toggle.classList.toggle('collapsed');
      childrenDiv.classList.toggle('collapsed');
    });

    // 递归子节点
    if (hasChildren) {
      buildLayerNodes(el, childrenDiv, depth + 1);
    }
  });
}

// ===================================================================
//  Phase 2: 折叠面板 & 分段控制器
// ===================================================================
function toggleSection(header) {
  header.classList.toggle('collapsed');
  const body = header.nextElementSibling;
  if (body) body.classList.toggle('collapsed');
}

function setTextAlign(value, btn) {
  applyStyle('textAlign', value);
  // 更新分段控制器 active 状态
  const parent = btn.parentElement;
  parent.querySelectorAll('.seg-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function updateTextAlignSegments(align) {
  const container = $('propTextAlign');
  if (!container) return;
  container.querySelectorAll('.seg-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.val === align);
  });
}

function applyAlign(direction) {
  applyStyle('textAlign', direction);
  updateTextAlignSegments(direction);
}

// ===================================================================
//  Phase 4: 画布标尺
// ===================================================================
function initRulers() {
  const hWrap = document.querySelector('.ruler-h-wrap');
  const vWrap = document.querySelector('.ruler-v-wrap');
  if (!hWrap || !vWrap) return;

  const ro = new ResizeObserver(() => drawRulers());
  ro.observe(hWrap);
  ro.observe(vWrap);
}

function drawRulers() {
  drawHorizontalRuler();
  drawVerticalRuler();
}

function drawHorizontalRuler() {
  const canvas = $('rulerH');
  const wrap = document.querySelector('.ruler-h-wrap');
  if (!canvas || !wrap) return;
  const w = wrap.clientWidth;
  canvas.width = w;
  canvas.height = 24;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, w, 24);

  const step = getRulerStep(canvasZoom);
  const offset = panX * 1 + w / 2; // centered layout offset

  ctx.fillStyle = '#6b7280';
  ctx.font = '9px Inter, sans-serif';
  ctx.textAlign = 'center';

  const startVal = Math.floor((-offset) / (step * canvasZoom)) * step;
  const endVal = Math.ceil((w - offset) / (step * canvasZoom)) * step;

  for (let val = startVal; val <= endVal; val += step) {
    const x = offset + val * canvasZoom;
    if (x < -10 || x > w + 10) continue;

    const isMajor = val % (step * 5) === 0;
    ctx.strokeStyle = isMajor ? '#9aa0b4' : '#4a4f63';
    ctx.beginPath();
    ctx.moveTo(x, isMajor ? 10 : 16);
    ctx.lineTo(x, 24);
    ctx.lineWidth = 1;
    ctx.stroke();

    if (isMajor) {
      ctx.fillText(val, x, 9);
    }
  }
}

function drawVerticalRuler() {
  const canvas = $('rulerV');
  const wrap = document.querySelector('.ruler-v-wrap');
  if (!canvas || !wrap) return;
  const h = wrap.clientHeight;
  canvas.width = 24;
  canvas.height = h;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 24, h);

  const step = getRulerStep(canvasZoom);
  const offset = panY * 1 + h / 2;

  ctx.fillStyle = '#6b7280';
  ctx.font = '9px Inter, sans-serif';
  ctx.textAlign = 'right';

  const startVal = Math.floor((-offset) / (step * canvasZoom)) * step;
  const endVal = Math.ceil((h - offset) / (step * canvasZoom)) * step;

  for (let val = startVal; val <= endVal; val += step) {
    const y = offset + val * canvasZoom;
    if (y < -10 || y > h + 10) continue;

    const isMajor = val % (step * 5) === 0;
    ctx.strokeStyle = isMajor ? '#9aa0b4' : '#4a4f63';
    ctx.beginPath();
    ctx.moveTo(isMajor ? 10 : 16, y);
    ctx.lineTo(24, y);
    ctx.lineWidth = 1;
    ctx.stroke();

    if (isMajor) {
      ctx.save();
      ctx.translate(9, y - 3);
      ctx.rotate(-Math.PI / 2);
      ctx.textAlign = 'center';
      ctx.fillText(val, 0, 0);
      ctx.restore();
    }
  }
}

function getRulerStep(zoom) {
  if (zoom >= 4) return 5;
  if (zoom >= 2) return 10;
  if (zoom >= 1) return 20;
  if (zoom >= 0.5) return 50;
  if (zoom >= 0.25) return 100;
  return 200;
}
