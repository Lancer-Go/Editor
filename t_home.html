<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>教师Web — 平台首页</title>
<link rel="stylesheet" href="_shared/design-tokens.css">
<link rel="stylesheet" href="_shared/components.css">
<link rel="stylesheet" href="_shared/pc-layout.css">
<style>
  .stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
  .stat-card { background: var(--bg-card); border-radius: var(--radius-lg); padding: 20px; }
  .stat-card .sc-label { font-size: var(--font-sm); color: var(--text-muted); }
  .stat-card .sc-value { font-size: 28px; font-weight: var(--fw-bold); margin-top: 4px; }
  .stat-card .sc-sub { font-size: var(--font-xs); color: var(--text-muted); margin-top: 4px; }
  .recent-hw { background: var(--bg-card); border-radius: var(--radius-lg); padding: 20px; }
  .recent-hw h3 { font-size: var(--font-lg); font-weight: var(--fw-semibold); margin-bottom: 14px; }
  .rh-item { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border-light); gap: 12px; }
  .rh-item:last-child { border-bottom: none; }
  .rh-item .rh-title { flex: 1; font-size: var(--font-md); font-weight: var(--fw-medium); }
  .rh-item .rh-class { font-size: var(--font-sm); color: var(--text-muted); width: 80px; }
  .rh-item .rh-progress { width: 120px; }
  .rh-item .rh-date { font-size: var(--font-sm); color: var(--text-muted); width: 100px; }
  .quick-actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 20px; }
  .qa-card { background: var(--bg-card); border-radius: var(--radius-lg); padding: 20px; text-align: center; cursor: pointer; transition: box-shadow var(--transition-base); }
  .qa-card:hover { box-shadow: var(--shadow-md); }
  .qa-card .qa-icon { width: 44px; height: 44px; border-radius: 10px; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; }
  .qa-card .qa-icon svg { width: 22px; height: 22px; stroke: #fff; fill: none; stroke-width: 2; }
  .qa-card .qa-title { font-size: var(--font-md); font-weight: var(--fw-semibold); }
</style>
</head>
<body>
<div class="pc-layout">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">
        <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="#fff" stroke-width="1.5"><rect x="2" y="1" width="12" height="14" rx="1.5"/><line x1="5" y1="5" x2="11" y2="5"/><line x1="5" y1="8" x2="11" y2="8"/><line x1="5" y1="11" x2="9" y2="11"/></svg>
      </div>
      南方数字教辅平台
    </div>
    <nav class="sidebar-nav">
      <a href="t_home.html" class="active"><span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0h2"/></svg></span>首页</a>
      <a href="t_homework_list.html"><span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg></span>作业中心</a>
      <a href="t_resource_center.html"><span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg></span>资源中心</a>
      <a href="t_report.html"><span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg></span>学情分析</a>
      <a href="t_student_mgmt.html"><span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg></span>学生管理</a>
      <a href="t_profile.html"><span class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M6 21v-2a4 4 0 014-4h4a4 4 0 014 4v2"/></svg></span>个人中心</a>
    </nav>
  </div>

  <!-- Main -->
  <div class="pc-main">
    <div class="topbar">
      <div class="topbar-left"><span class="topbar-title">首页</span></div>
      <div class="topbar-right">
        <div class="avatar avatar-sm" style="background: #ddd;">周</div>
        <span>周策 老师</span>
      </div>
    </div>

    <div class="pc-content">
      <!-- Stats -->
      <div class="stat-row">
        <div class="stat-card">
          <div class="sc-label">进行中作业</div>
          <div class="sc-value" style="color: var(--brand-primary);">3</div>
          <div class="sc-sub">本周发布 2 份</div>
        </div>
        <div class="stat-card">
          <div class="sc-label">待批改</div>
          <div class="sc-value" style="color: var(--warning);">5</div>
          <div class="sc-sub">有 128 份作业待阅</div>
        </div>
        <div class="stat-card">
          <div class="sc-label">已完成</div>
          <div class="sc-value" style="color: var(--success);">12</div>
          <div class="sc-sub">本月已完成</div>
        </div>
        <div class="stat-card">
          <div class="sc-label">班级学生</div>
          <div class="sc-value">90</div>
          <div class="sc-sub">三(1)班 45 · 三(2)班 45</div>
        </div>
      </div>

      <!-- Recent Homework -->
      <div class="recent-hw">
        <h3>最近作业</h3>
        <div class="rh-item" onclick="location.href='t_homework_detail.html'" style="cursor:pointer;">
          <span class="status-dot status-dot-blue"></span>
          <div class="rh-title">第三单元随堂练习</div>
          <div class="rh-class">三(2)班</div>
          <div class="rh-progress">
            <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 4px;">提交 28/45</div>
            <div class="progress-bar"><div class="progress-bar-fill" style="width: 62%;"></div></div>
          </div>
          <div class="rh-date">2026-03-25</div>
          <span class="tag tag-blue">进行中</span>
        </div>
        <div class="rh-item" onclick="location.href='t_grading_detail.html'" style="cursor:pointer;">
          <span class="status-dot status-dot-orange"></span>
          <div class="rh-title">第二单元同步练</div>
          <div class="rh-class">三(2)班</div>
          <div class="rh-progress">
            <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 4px;">已阅 30/42</div>
            <div class="progress-bar"><div class="progress-bar-fill" style="width: 71%; background: var(--warning);"></div></div>
          </div>
          <div class="rh-date">2026-03-22</div>
          <span class="tag tag-orange">待批改</span>
        </div>
        <div class="rh-item" onclick="location.href='t_report.html'" style="cursor:pointer;">
          <span class="status-dot status-dot-green"></span>
          <div class="rh-title">分数加减法练习</div>
          <div class="rh-class">三(1)班</div>
          <div class="rh-progress">
            <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 4px;">已阅 44/44</div>
            <div class="progress-bar"><div class="progress-bar-fill" style="width: 100%; background: var(--success);"></div></div>
          </div>
          <div class="rh-date">2026-03-20</div>
          <span class="tag tag-green">已完成</span>
        </div>
      </div>

      <!-- Quick Actions -->
      <div class="quick-actions">
        <div class="qa-card" onclick="location.href='t_resource_center.html'">
          <div class="qa-icon" style="background: var(--brand-primary);"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div>
          <div class="qa-title">新建作业</div>
        </div>
        <div class="qa-card" onclick="location.href='t_homework_list.html'">
          <div class="qa-icon" style="background: #8B5CF6;"><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></div>
          <div class="qa-title">去批改</div>
        </div>
        <div class="qa-card" onclick="location.href='t_report.html'">
          <div class="qa-icon" style="background: #f59e0b;"><svg viewBox="0 0 24 24"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg></div>
          <div class="qa-title">查看报告</div>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="page-label">教师Web · 平台首页 · 1440×900</div>
</body>
</html>
